<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Market-U | Campus Marketplace</title>

  <!-- iOS PWA: tells Safari this is a full-screen installable app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Market-U" />
  <!-- iOS home screen icon -->
  <link rel="apple-touch-icon" href="/icon.png" />
  <!-- iOS: theme color for browser chrome -->
  <meta name="theme-color" content="#2563eb" />

  <!-- Primary Meta -->
  <meta name="description" content="Buy, sell & discover on Market-U — the trusted campus marketplace for students." />

  <!-- Open Graph / WhatsApp / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://marketu.store/" />
  <meta property="og:title" content="Market-U | Campus Marketplace" />
  <meta property="og:description" content="Buy, sell & discover on Market-U — the trusted campus marketplace for students." />
  <meta property="og:image" content="https://marketu.store/og-preview.jpg" />
  <meta property="og:image:secure_url" content="https://marketu.store/og-preview.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Market-U — Campus Marketplace for Students" />
  <meta property="og:site_name" content="Market-U" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card (also used by some platforms) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://marketu.store/" />
  <meta name="twitter:title" content="Market-U | Campus Marketplace" />
  <meta name="twitter:description" content="Buy, sell & discover on Market-U — the trusted campus marketplace for students." />
  <meta name="twitter:image" content="https://marketu.store/og-preview.jpg" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('SW registered: ', registration);
        }).catch(registrationError => {
          console.log('SW registration failed: ', registrationError);
        });
      });
    }
  </script>
</body>

</html>
